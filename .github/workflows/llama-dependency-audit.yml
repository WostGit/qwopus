name: llama.cpp dependency + typo robustness audit

on:
  workflow_dispatch:
    inputs:
      full_eval:
        description: "Run heavier typo robustness eval"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
      - work
  pull_request:

jobs:
  audit-and-build:
    name: audit-${{ matrix.build_name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_name: native
            cmake_flags: "-DGGML_NATIVE=ON -DGGML_OPENBLAS=OFF"

    env:
      MODEL_REPO: Jackrong/Qwen3.5-2B-Claude-4.6-Opus-Reasoning-Distilled-GGUF
      BUILD_DIR: build
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      CI_PROMPT_LIMIT: "10"
      CI_N_PREDICT: "4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install baseline tooling
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            git \
            jq \
            python3 \
            python3-pip \
            ca-certificates

      - name: Pre-flight hardware audit (AVX2 + F16C + 8GiB contiguous allocation)
        run: |
          set -euxo pipefail
          lscpu
          flags="$(lscpu | awk -F: '/Flags/ {print $2}')"
          echo "CPU Flags:${flags}"
          echo "${flags}" | grep -qw avx2
          echo "${flags}" | grep -qw f16c

          python3 - <<'PY'
          import mmap

          size = 8 * 1024 * 1024 * 1024
          print(f"Attempting contiguous virtual memory reservation: {size} bytes")
          try:
              mm = mmap.mmap(-1, size, access=mmap.ACCESS_WRITE)
              page = 2 * 1024 * 1024
              for i in range(0, size, page):
                  mm[i:i+1] = b"\x01"
              mm.close()
              print("8GiB contiguous virtual memory reservation + touch: PASS")
          except Exception as exc:
              raise SystemExit(f"Memory provisioning test failed: {exc}")
          PY

      - name: Dynamic dependency scan (CMake >=3.24 and Clang/LLVM 15)
        run: |
          set -euxo pipefail
          sudo apt-get install -y --no-install-recommends \
            cmake \
            clang-15 \
            llvm-15 \
            libopenblas-dev

          cmake_ver="$(cmake --version | awk 'NR==1 {print $3}')"
          python3 - <<'PY' "$cmake_ver"
          import sys
          from packaging.version import Version

          current = Version(sys.argv[1])
          minimum = Version("3.24.0")
          if current < minimum:
              raise SystemExit(f"CMake {current} is below required {minimum}")
          print(f"CMake check passed: {current} >= {minimum}")
          PY

          clang-15 --version
          llvm-config-15 --version

      - name: Install Python eval dependencies (HF Hub)
        run: |
          set -euxo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade "huggingface_hub[cli]" packaging

      - name: Authenticate Hugging Face (optional)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -n "${HF_TOKEN:-}" ]; then
            if command -v hf >/dev/null 2>&1; then
              hf auth login --token "$HF_TOKEN" --add-to-git-credential
            elif command -v huggingface-cli >/dev/null 2>&1; then
              huggingface-cli login --token "$HF_TOKEN" --add-to-git-credential
            else
              python3 -m huggingface_hub login --token "$HF_TOKEN" --add-to-git-credential
            fi
          else
            echo "HF_TOKEN not set; continuing without explicit login"
          fi

      - name: Fetch llama.cpp source
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/ggml-org/llama.cpp.git

      - name: Configure and build llama.cpp (${{ matrix.build_name }})
        working-directory: llama.cpp
        env:
          CC: clang-15
          CXX: clang++-15
        run: |
          set -euxo pipefail
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_CURL=ON \
            ${{ matrix.cmake_flags }}
          cmake --build "$BUILD_DIR" --config Release --target llama-bench llama-cli -j"$(nproc)"

      - name: Download Qwen distilled GGUF model
        run: |
          set -euxo pipefail
          mkdir -p models
          if command -v hf >/dev/null 2>&1; then
            hf download "$MODEL_REPO" --local-dir models
          elif command -v huggingface-cli >/dev/null 2>&1; then
            huggingface-cli download "$MODEL_REPO" --local-dir models
          else
            python3 -m huggingface_hub download "$MODEL_REPO" --local-dir models
          fi

          model_file="$(find models -type f -name '*.gguf' | head -n 1)"
          test -n "$model_file"
          echo "MODEL_FILE=$model_file" >> "$GITHUB_ENV"
          du -h "$model_file"

      - name: Functional verification (50-token llama-bench)
        working-directory: llama.cpp
        run: |
          set -euxo pipefail
          ./"$BUILD_DIR"/bin/llama-bench \
            -m "../${MODEL_FILE}" \
            -n 50 \
            -p 32 \
            -t "$(nproc)" \
            -ngl 0

      - name: Typo robustness evaluation (clean vs MulTypo-perturbed prompts)
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_eval }}" = "true" ]; then
            export CI_PROMPT_LIMIT=60
            export CI_N_PREDICT=8
          fi
          echo "===== TYPO ROBUSTNESS CONFIG ====="
          echo "build_name=${{ matrix.build_name }}"
          echo "limit=${CI_PROMPT_LIMIT}"
          echo "n_predict=${CI_N_PREDICT}"
          echo "model_file=${MODEL_FILE}"
          echo "=================================="
          start_ts="$(date +%s)"
          python3 scripts/typo_robustness_eval.py \
            --dataset benchmark/clean_prompts.jsonl \
            --output-dir eval_artifacts \
            --llama-cli llama.cpp/$BUILD_DIR/bin/llama-cli \
            --model "$MODEL_FILE" \
            --limit "$CI_PROMPT_LIMIT" \
            --typo-rate 0.20 \
            --seed 1337 \
            --n-predict "$CI_N_PREDICT"
          end_ts="$(date +%s)"
          echo "typo_eval_elapsed_seconds=$((end_ts - start_ts))"

          echo "===== BEGIN TYPO ROBUSTNESS REPORT ====="
          cat eval_artifacts/robustness_report.md
          echo "===== END TYPO ROBUSTNESS REPORT ====="
          echo "===== BEGIN AGGREGATE CSV ====="
          cat eval_artifacts/aggregate.csv
          echo "===== END AGGREGATE CSV ====="

      - name: Archive optimized binaries + logs
        uses: actions/upload-artifact@v4
        with:
          name: llama-${{ matrix.build_name }}-artifacts
          path: |
            llama.cpp/${{ env.BUILD_DIR }}/bin/llama-bench
            llama.cpp/${{ env.BUILD_DIR }}/bin/llama-cli
            models
            benchmark/clean_prompts.jsonl
            eval_artifacts
          if-no-files-found: error
